<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Sportif Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #136dec;
            --card-bg: rgba(255, 255, 255, 0.05);
            --sidebar-bg: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Styles additionnels pour l'éditeur */
        .admin-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            gap: 10px;
        }

        .admin-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(19, 109, 236, 0.4);
            transition: transform 0.2s;
        }

        .admin-btn:hover {
            transform: scale(1.05);
        }

        .admin-btn.add {
            background: #2ed573;
        }

        /* Modal d'ajout de contenu */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(15px);
        }

        .admin-modal-content {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .admin-modal-content h2 {
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
        }

        .admin-btn.logout {
            background: #ff4757;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 8px 0;
        }

        .tag-badge {
            font-size: 0.7rem;
            background: rgba(19, 109, 236, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(19, 109, 236, 0.2);
        }

        .edit-overlay {
            position: relative;
            cursor: pointer;
            border: 1px dashed transparent;
            transition: border 0.3s;
        }

        .edit-overlay:hover {
            border: 1px dashed var(--accent-color);
        }

        .edit-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent-color);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        body.admin-mode .edit-badge {
            display: block;
        }

        .ql-container.ql-snow {
            border: none !important;
            font-family: inherit !important;
            font-size: inherit !important;
        }

        .ql-editor {
            padding: 0 !important;
            color: inherit !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(19, 109, 236, 0.3);
        }

        .athlete-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .athlete-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .athlete-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .athlete-stats {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            color: var(--accent-color);
        }

        /* Main Content */
        main {
            margin-left: 300px;
            flex: 1;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .filters {
            display: flex;
            gap: 15px;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Portfolio Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .portfolio-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .portfolio-item:hover {
            transform: scale(1.03);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-container {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .portfolio-item:hover .thumbnail-container img {
            transform: scale(1.1);
        }

        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .portfolio-item:hover .play-icon {
            opacity: 1;
        }

        .item-content {
            padding: 20px;
        }

        .item-content h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .item-content p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: black;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1001;
            font-weight: bold;
        }

        video,
        img.expanded {
            width: 100%;
            display: block;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            aside {
                width: 250px;
            }

            main {
                margin-left: 250px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            aside {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }

            main {
                margin-left: 0;
                padding: 20px;
            }

            header {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="admin-controls">
        <button id="admin-login-btn" class="admin-btn">🔑 Admin</button>
        <button id="admin-add-btn" class="admin-btn add" style="display: none;">+ Ajouter</button>
        <button id="admin-logout-btn" class="admin-btn logout" style="display: none;">Déconnexion</button>
        <button id="admin-save-btn" class="admin-btn" style="display: none; background: #2ed573;">Enregistrer</button>
    </div>

    <!-- Modal Ajout Contenu -->
    <div id="add-content-modal" class="admin-modal">
        <div class="admin-modal-content">
            <h2>Nouvel Extrait</h2>
            <form id="add-content-form">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="item-title" required placeholder="Ex: But en finale">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="item-type">
                        <option value="photo">Photo</option>
                        <option value="video">Vidéo Locale</option>
                        <option value="youtube">Vidéo YouTube</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fichier local (Optionnel - remplira l'URL)</label>
                    <input type="file" id="item-file" accept="image/*,video/*">
                </div>
                <div class="form-group">
                    <label>URL du média / ID YouTube</label>
                    <input type="text" id="item-url" required placeholder="media/photos/img.jpg ou lien YT">
                </div>
                <div class="form-group">
                    <label>Miniature (obligatoire pour vidéos)</label>
                    <input type="text" id="item-thumbnail" placeholder="media/thumbnails/thumb.jpg">
                    <input type="file" id="item-thumb-file" accept="image/*" style="margin-top:5px; font-size: 0.8rem;">
                </div>
                <div class="form-group">
                    <label>Catégorie (Filtre)</label>
                    <input type="text" id="item-category" required list="category-list" placeholder="Ex: Buts">
                    <datalist id="category-list"></datalist>
                </div>
                <div class="form-group">
                    <label>Tags (séparés par des virgules)</label>
                    <input type="text" id="item-tags" placeholder="Ex: Précision, Finale, Extérieur">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="item-description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-add" class="admin-btn logout">Annuler</button>
                    <button type="submit" id="submit-add" class="admin-btn add">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loading-overlay" class="admin-modal" style="z-index: 4000; flex-direction: column;">
        <div class="spinner"
            style="width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;">
        </div>
        <p id="loading-text">Traitement en cours...</p>
    </div>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <aside id="athlete-profile">
        <img src="" alt="Photo de profil" class="profile-pic" id="athlete-pic">
        <div class="athlete-info">
            <div class="edit-overlay" data-field="athlete.name">
                <h1 id="athlete-name">Chargement...</h1>
                <span class="edit-badge">Éditer</span>
            </div>
            <div class="edit-overlay" data-field="athlete.position">
                <p id="athlete-pos"></p>
                <span class="edit-badge">Éditer</span>
            </div>
        </div>

        <div class="athlete-stats">
            <div class="stat-item">
                <span class="stat-label">Numéro</span>
                <span class="stat-value" id="athlete-num">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Position</span>
                <span class="stat-value" id="athlete-pos-label">-</span>
            </div>
        </div>

        <div class="edit-overlay" data-field="athlete.bio">
            <p id="athlete-bio"
                style="font-size: 0.85rem; color: var(--text-secondary); text-align: center; line-height: 1.5; padding: 0 10px;">
            </p>
            <span class="edit-badge">Éditer</span>
        </div>
    </aside>

    <main>
        <header>
            <h2>Exploration des séquences</h2>
            <div class="filters" id="filter-container">
                <button class="filter-btn active" data-filter="Tous">Tous</button>
                <!-- Filtres générés dynamiquement -->
            </div>
        </header>

        <div class="portfolio-grid" id="portfolio-grid">
            <!-- Items générés dynamiquement -->
        </div>
    </main>

    <div class="modal" id="media-modal">
        <div class="close-modal" id="close-btn">&times;</div>
        <div class="modal-content" id="modal-container">
            <!-- Media content -->
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script type="module">
        import { Editor } from './js/editor.js';

        let allItems = [];
        let athleteData = {};
        let editorInstance = null;

        async function initPortfolio() {
            try {
                // Charger les données depuis data.json
                const response = await fetch('data.json');
                const data = await response.json();

                athleteData = data.athlete;
                allItems = data.items;

                // Initialiser l'éditeur avec les données chargées
                editorInstance = new Editor(data);

                // Mettre à jour le profil de l'athlète
                document.getElementById('athlete-name').innerHTML = athleteData.name;
                document.getElementById('athlete-pic').src = athleteData.profilePicture;
                document.getElementById('athlete-pos').innerHTML = athleteData.position;
                document.getElementById('athlete-pos-label').innerHTML = athleteData.position;
                document.getElementById('athlete-num').textContent = athleteData.number;
                document.getElementById('athlete-bio').innerHTML = athleteData.bio;

                // Générer les filtres uniques
                const categories = ['Tous', ...new Set(allItems.map(item => item.category))];
                renderFilters(categories);

                // Rendre tous les items
                renderGrid('Tous');

            } catch (error) {
                console.error("Erreur de chargement des données:", error);
            }
        }

        function renderFilters(categories) {
            const container = document.getElementById('filter-container');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${cat === 'Tous' ? 'active' : ''}`;
                btn.textContent = cat;
                btn.dataset.filter = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGrid(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderGrid(filter) {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';

            const filteredItems = filter === 'Tous'
                ? allItems
                : allItems.filter(item => item.category === filter);

            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'portfolio-item';
                card.onclick = () => openModal(item);

                const isVideo = item.type === 'video' || item.type === 'youtube';
                const tagsHtml = item.tags ? item.tags.map(t => `<span class="tag-badge">#${t}</span>`).join(' ') : '';

                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${item.thumbnail}" alt="${item.title}">
                        <span class="category-badge">${item.category}</span>
                        ${isVideo ? `<div class="play-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>` : ''}
                    </div>
                    <div class="item-content">
                        <h3>${item.title}</h3>
                        <div class="tags-container">${tagsHtml}</div>
                        <p>${item.description}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(item) {
            const modal = document.getElementById('media-modal');
            const container = document.getElementById('modal-container');

            if (item.type === 'video') {
                container.innerHTML = `
                    <video controls autoplay>
                        <source src="${item.url}" type="video/mp4">
                        Votre navigateur ne supporte pas la lecture de vidéos.
                    </video>
                `;
            } else if (item.type === 'youtube') {
                const videoId = extractYouTubeId(item.url);
                container.innerHTML = `
                    <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden;">
                        <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                                style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen></iframe>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <img src="${item.url}" class="expanded">
                `;
            }

            modal.style.display = 'flex';
        }

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        // Fermeture modal
        document.getElementById('close-btn').onclick = () => {
            document.getElementById('media-modal').style.display = 'none';
            document.getElementById('modal-container').innerHTML = '';
        };

        window.onclick = (event) => {
            if (event.target == document.getElementById('media-modal')) {
                document.getElementById('media-modal').style.display = 'none';
                document.getElementById('modal-container').innerHTML = '';
            }
        };

        initPortfolio();

        // Exposer les fonctions nécessaires au scope global pour les appels depuis le HTML
        window.openModal = openModal;
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Sportif Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #136dec;
            --card-bg: rgba(255, 255, 255, 0.05);
            --sidebar-bg: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Styles additionnels pour l'éditeur */
        .admin-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            gap: 10px;
        }

        .admin-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(19, 109, 236, 0.4);
            transition: transform 0.2s;
        }

        .admin-btn:hover {
            transform: scale(1.05);
        }

        .admin-btn.add {
            background: #2ed573;
        }

        /* Modal d'ajout de contenu */
        .admin-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(15px);
        }

        .admin-modal-content {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .admin-modal-content h2 {
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button {
            flex: 1;
        }

        .search-container {
            width: 100%;
            margin-bottom: 30px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px 15px 45px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-bar:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(19, 109, 236, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s;
        }

        .delete-btn:hover {
            transform: scale(1.1);
        }

        body.admin-mode .delete-btn {
            display: flex;
        }

        .admin-btn.logout {
            background: #ff4757;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 8px 0;
        }

        .tag-badge {
            font-size: 0.7rem;
            background: rgba(19, 109, 236, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(19, 109, 236, 0.2);
        }

        .edit-overlay {
            position: relative;
            cursor: pointer;
            border: 1px dashed transparent;
            transition: border 0.3s;
        }

        .edit-overlay:hover {
            border: 1px dashed var(--accent-color);
        }

        .edit-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--accent-color);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        body.admin-mode .edit-badge {
            display: block;
        }

        .ql-container.ql-snow {
            border: none !important;
            font-family: inherit !important;
            font-size: inherit !important;
        }

        .ql-editor {
            padding: 0 !important;
            color: inherit !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--glass-border);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .profile-pic-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(19, 109, 236, 0.3);
            transition: all 0.3s;
        }

        .profile-edit-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--accent-color);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--sidebar-bg);
            z-index: 10;
        }

        body.admin-mode .profile-edit-badge {
            display: flex;
        }

        .profile-pic-container:hover .profile-pic {
            filter: brightness(0.7);
        }

        .athlete-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .athlete-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .athlete-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .athlete-stats {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            color: var(--accent-color);
        }

        .section-title {
            color: var(--accent-color);
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 25px;
            text-align: left;
            width: 100%;
            padding-left: 10px;
        }

        .filter-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-right: 15px;
            font-weight: 600;
        }

        /* Main Content */
        main {
            margin-left: 300px;
            flex: 1;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .filters {
            position: relative;
            display: inline-block;
        }

        .filter-dropdown-trigger {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            min-width: 180px;
            justify-content: space-between;
        }

        .filter-dropdown-trigger:hover {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-dropdown-trigger.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(19, 109, 236, 0.2);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 10px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dropdown-item:hover {
            background: rgba(19, 109, 236, 0.1);
            color: white;
        }

        .dropdown-item.active {
            color: var(--accent-color);
            background: rgba(19, 109, 236, 0.05);
            font-weight: 600;
        }

        .dropdown-item .check {
            display: none;
        }

        .dropdown-item.active .check {
            display: inline;
        }

        /* Portfolio Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .portfolio-item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .portfolio-item:hover {
            transform: scale(1.03);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-container {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .portfolio-item:hover .thumbnail-container img {
            transform: scale(1.1);
        }

        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .portfolio-item:hover .play-icon {
            opacity: 1;
        }

        .item-content {
            padding: 20px;
        }

        .item-content h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .item-content p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: black;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1001;
            font-weight: bold;
        }

        video,
        img.expanded {
            width: 100%;
            display: block;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            aside {
                width: 250px;
            }

            main {
                margin-left: 250px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            aside {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }

            main {
                margin-left: 0;
                padding: 20px;
            }

            header {
                flex-direction: column;
                gap: 20px;
            }
        }

        /* Cropper Modal Styles */
        #cropper-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cropper-container-wrapper {
            width: 100%;
            max-width: 800px;
            max-height: 70vh;
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .cropper-actions {
            display: flex;
            gap: 20px;
        }

        .cropper-btn {
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .cropper-save {
            background: var(--accent-color);
            color: white;
        }

        .cropper-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>

<body>

    <div class="admin-controls">
        <button id="admin-login-btn" class="admin-btn">🔑 Admin</button>
        <button id="admin-add-btn" class="admin-btn add" style="display: none;">+ Ajouter</button>
        <button id="admin-logout-btn" class="admin-btn logout" style="display: none;">Déconnexion</button>
        <button id="admin-save-btn" class="admin-btn" style="display: none; background: #2ed573;">Enregistrer</button>
    </div>

    <!-- Modal Ajout Contenu -->
    <div id="add-content-modal" class="admin-modal">
        <div class="admin-modal-content">
            <h2>Nouvel Extrait</h2>
            <form id="add-content-form">
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="item-title" required placeholder="Ex: But en finale">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="item-type">
                        <option value="photo">Photo</option>
                        <option value="video">Vidéo Locale</option>
                        <option value="youtube">Vidéo YouTube</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fichier local (Optionnel - remplira l'URL)</label>
                    <input type="file" id="item-file" accept="image/*,video/*">
                </div>
                <div class="form-group">
                    <label>URL du média / ID YouTube</label>
                    <input type="text" id="item-url" required placeholder="media/photos/img.jpg ou lien YT">
                </div>
                <div class="form-group">
                    <label>Miniature (obligatoire pour vidéos)</label>
                    <input type="text" id="item-thumbnail" placeholder="media/thumbnails/thumb.jpg">
                    <input type="file" id="item-thumb-file" accept="image/*" style="margin-top:5px; font-size: 0.8rem;">
                </div>
                <div class="form-group">
                    <label>Catégorie (Filtre)</label>
                    <input type="text" id="item-category" required list="category-list" placeholder="Ex: Buts">
                    <datalist id="category-list"></datalist>
                </div>
                <div class="form-group">
                    <label>Tags (séparés par des virgules)</label>
                    <input type="text" id="item-tags" placeholder="Ex: Précision, Finale, Extérieur" list="tags-list">
                    <datalist id="tags-list"></datalist>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="item-description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-add" class="admin-btn logout">Annuler</button>
                    <button type="submit" id="submit-add" class="admin-btn add">Sauvegarder</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loading-overlay" class="admin-modal" style="z-index: 4000; flex-direction: column;">
        <div class="spinner"
            style="width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;">
        </div>
        <p id="loading-text">Traitement en cours...</p>
    </div>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <aside id="athlete-profile">
        <div class="profile-pic-container" id="profile-pic-trigger">
            <img src="" alt="Photo de profil" class="profile-pic" id="athlete-pic">
            <div class="profile-edit-badge">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>
            <input type="file" id="profile-pic-input" style="display: none;" accept="image/*">
        </div>
        <div class="athlete-info">
            <div class="edit-overlay" data-field="athlete.name">
                <h1 id="athlete-name">Chargement...</h1>
                <span class="edit-badge">Éditer</span>
            </div>
            <div class="edit-overlay" data-field="athlete.position">
                <p id="athlete-pos"></p>
                <span class="edit-badge">Éditer</span>
            </div>
        </div>

        <div class="athlete-stats">
            <div class="stat-item">
                <span class="stat-label">Numéro</span>
                <span class="stat-value" id="athlete-num">-</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Position</span>
                <span class="stat-value" id="athlete-pos-label">-</span>
            </div>
        </div>

        <div class="section-title">Bio :</div>
        <div class="edit-overlay" data-field="athlete.bio">
            <p id="athlete-bio"
                style="font-size: 0.85rem; color: var(--text-secondary); text-align: left; line-height: 1.5; padding: 0 10px;">
            </p>
            <span class="edit-badge">Éditer</span>
        </div>

        <div class="section-title">Club :</div>
        <div class="edit-overlay" data-field="athlete.clubs">
            <div id="athlete-clubs"
                style="font-size: 0.85rem; color: var(--text-secondary); text-align: left; line-height: 1.5; padding: 0 10px;">
            </div>
            <span class="edit-badge">Éditer</span>
        </div>
    </aside>

    <main>
        <header>
            <div class="header-content">
                <h2>Exploration des séquences</h2>
                <div class="search-container">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="search-bar" class="search-bar"
                        placeholder="Rechercher par mot-clé, tag, catégorie...">
                </div>
            </div>
            <div style="display: flex; align-items: center;">
                <span class="filter-hint">Personnaliser l'affichage :</span>
                <div class="filters" id="filter-container">
                    <!-- Filtres et tags dynamiques -->
                </div>
            </div>
        </header>

        <div class="portfolio-grid" id="portfolio-grid">
            <!-- Items filtrés par JS -->
        </div>
    </main>

    <div class="modal" id="media-modal">
        <div class="close-modal" id="close-btn">&times;</div>
        <div class="modal-content" id="modal-container">
            <!-- Media content -->
        </div>
    </div>

    <!-- Cropper Modal -->
    <div id="cropper-modal">
        <div class="cropper-container-wrapper">
            <img id="cropper-image" src="" style="max-width: 100%;">
        </div>
        <div class="cropper-actions">
            <button class="cropper-btn cropper-cancel" id="cropper-cancel">Annuler</button>
            <button class="cropper-btn cropper-save" id="cropper-save">Valider le recadrage</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module">
        import { Editor } from './js/editor.js';

        let allItems = [];
        let athleteData = {};
        let editorInstance = null;

        let currentFilter = 'Tous';
        let searchQuery = '';

        async function initPortfolio() {
            try {
                const response = await fetch(`data.json?t=${Date.now()}`);
                const data = await response.json();

                athleteData = data.athlete;
                allItems = data.items;
                // Initialiser l'éditeur avec les données chargées
                editorInstance = new Editor(data);
                window.editorInstance = editorInstance;

                document.getElementById('athlete-name').innerHTML = athleteData.name;
                document.getElementById('athlete-pic').src = athleteData.profilePicture;
                document.getElementById('athlete-pos-label').innerHTML = athleteData.position;
                document.getElementById('athlete-num').textContent = athleteData.number;
                document.getElementById('athlete-bio').innerHTML = athleteData.bio;
                document.getElementById('athlete-clubs').innerHTML = athleteData.clubs || "Aucun club renseigné";
                document.getElementById('athlete-clubs').innerHTML = athleteData.clubs || "Aucun club renseigné";

                const categories = ['Tous', ...new Set(allItems.map(item => item.category))];
                renderFilters(categories);
                renderGrid();

                // Recherche en temps réel
                document.getElementById('search-bar').oninput = (e) => {
                    searchQuery = e.target.value.toLowerCase();
                    renderGrid();
                };

            } catch (error) {
                console.error("Erreur de chargement des données:", error);
            }
        }

        function renderFilters(categories) {
            const container = document.getElementById('filter-container');
            container.innerHTML = `
                <button class="filter-dropdown-trigger" id="filter-trigger">
                    <span id="current-filter-text">${currentFilter}</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="dropdown-menu" id="filter-menu">
                    ${categories.map(cat => `
                        <div class="dropdown-item ${cat === currentFilter ? 'active' : ''}" data-value="${cat}">
                            ${cat}
                            <svg class="check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                    `).join('')}
                </div>
            `;

            const trigger = document.getElementById('filter-trigger');
            const menu = document.getElementById('filter-menu');

            trigger.onclick = (e) => {
                e.stopPropagation();
                menu.classList.toggle('show');
                trigger.classList.toggle('active');
            };

            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.onclick = (e) => {
                    e.stopPropagation();
                    const val = item.getAttribute('data-value');
                    currentFilter = val;
                    document.getElementById('current-filter-text').textContent = val;
                    menu.classList.remove('show');
                    trigger.classList.remove('active');
                    renderGrid();
                    // Relancer le rendu des filtres pour l'état active (optionnel, mais propre)
                    renderFilters(categories);
                };
            });

            // Fermer si clic ailleurs
            document.addEventListener('click', (event) => {
                if (!event.target.closest('.filters')) {
                    if (menu.classList.contains('show')) {
                        menu.classList.remove('show');
                        trigger.classList.remove('active');
                    }
                }
            });
        }

        function renderGrid() {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = '';

            const filteredItems = allItems.filter(item => {
                const matchesFilter = currentFilter === 'Tous' || item.category === currentFilter;
                const matchesSearch = !searchQuery ||
                    item.title.toLowerCase().includes(searchQuery) ||
                    item.description.toLowerCase().includes(searchQuery) ||
                    (item.tags && item.tags.some(t => t.toLowerCase().includes(searchQuery)));
                return matchesFilter && matchesSearch;
            });

            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'portfolio-item';

                const isVideo = item.type === 'video' || item.type === 'youtube';
                const tagsHtml = item.tags ? item.tags.map(t => `<span class="tag-badge">#${t}</span>`).join(' ') : '';

                card.innerHTML = `
                    <button class="delete-btn" title="Supprimer" onclick="event.stopPropagation(); window.editorInstance.deleteItem(${item.id})">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                    <div class="thumbnail-container" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        <img src="${item.thumbnail}" alt="${item.title}">
                        <span class="category-badge">${item.category}</span>
                        ${isVideo ? `<div class="play-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>` : ''}
                    </div>
                    <div class="item-content" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        <h3>${item.title}</h3>
                        <div class="tags-container">${tagsHtml}</div>
                        <p>${item.description}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(item) {
            const modal = document.getElementById('media-modal');
            const container = document.getElementById('modal-container');

            if (item.type === 'video') {
                container.innerHTML = `
                    <video controls autoplay>
                        <source src="${item.url}" type="video/mp4">
                        Votre navigateur ne supporte pas la lecture de vidéos.
                    </video>
                `;
            } else if (item.type === 'youtube') {
                const videoId = extractYouTubeId(item.url);
                container.innerHTML = `
                    <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden;">
                        <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                                style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen></iframe>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <img src="${item.url}" class="expanded">
                `;
            }

            modal.style.display = 'flex';
        }

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        // Fermeture modal
        document.getElementById('close-btn').onclick = () => {
            document.getElementById('media-modal').style.display = 'none';
            document.getElementById('modal-container').innerHTML = '';
        };

        window.onclick = (event) => {
            if (event.target == document.getElementById('media-modal')) {
                document.getElementById('media-modal').style.display = 'none';
                document.getElementById('modal-container').innerHTML = '';
            }
        };

        initPortfolio();

        // Exposer les fonctions nécessaires au scope global pour les appels depuis le HTML
        window.openModal = openModal;
    </script>
</body>

</html>
